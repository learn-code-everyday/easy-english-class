name: Build & Deploy MAP Visualizer Frontend

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_APPNAME }}:prod
          build-args: |
            NEXT_PUBLIC_API_URI=${{ secrets.NEXT_PUBLIC_API_URI }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code (for docker-compose)
        uses: actions/checkout@v3

      - name: Create env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/app.pem
          chmod 600 ~/.ssh/app.pem
          ssh-keyscan -H ${{ secrets.EC2_IP }} >> ~/.ssh/known_hosts

      - name: Upload docker-compose
        run: |
          scp -i ~/.ssh/app.pem docker-compose.yml \
          ${{ secrets.SSH_USER }}@${{ secrets.EC2_IP }}:/home/www/english-class/fe-deploy/docker-compose.yml

      - name: Upload env
        run: |
          scp -i ~/.ssh/app.pem .env \
          ${{ secrets.SSH_USER }}@${{ secrets.EC2_IP }}:/home/www/english-class/fe-deploy/.env

      - name: Deploy
        run: |
          ssh -i ~/.ssh/app.pem \
          ${{ secrets.SSH_USER }}@${{ secrets.EC2_IP }} << 'EOF'

            cd /home/www/english-class/fe-deploy

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_APPNAME }}:prod

            docker compose down
            docker compose up -d --force-recreate

            docker ps
          EOF
